<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>世界文化マップ</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --color-background-primary: #ffffff;
  --color-background-secondary: #f4f3ee;
  --color-text-primary: #1a1a18;
  --color-text-secondary: #5f5e5a;
  --color-border-tertiary: rgba(0,0,0,0.12);
  --color-border-secondary: rgba(0,0,0,0.22);
  --font-sans: system-ui, -apple-system, 'Hiragino Sans', 'Yu Gothic', sans-serif;
  --border-radius-md: 8px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --color-background-primary: #1c1c1a;
    --color-background-secondary: #2a2a27;
    --color-text-primary: #f0ede6;
    --color-text-secondary: #a8a69f;
    --color-border-tertiary: rgba(255,255,255,0.1);
    --color-border-secondary: rgba(255,255,255,0.2);
  }
}

body {
  font-family: var(--font-sans);
  background: var(--color-background-primary);
  color: var(--color-text-primary);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

h1 {
  font-size: 15px;
  font-weight: 500;
  padding: 10px 14px 8px;
  border-bottom: 0.5px solid var(--color-border-tertiary);
  flex-shrink: 0;
  color: var(--color-text-primary);
  display: flex;
  align-items: center;
  gap: 8px;
}

h1 span.sub {
  font-size: 11px;
  font-weight: 400;
  color: var(--color-text-secondary);
}

#app { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

#map-container { flex: 1; position: relative; overflow: hidden; background: #c8dff0; min-height: 0; }

svg#map { width: 100%; height: 100%; cursor: grab; }
svg#map:active { cursor: grabbing; }

.country { fill: #e8dcc8; stroke: #b5a080; stroke-width: 0.3; cursor: pointer; transition: fill 0.15s; }
.country:hover { fill: #d4c4a8; }
.country.active { fill: #c0784a; }
.country.highlight { fill: #dbc89a; }

#hint {
  position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.5); color: #fff; font-size: 11px;
  padding: 4px 12px; border-radius: 20px; pointer-events: none;
  transition: opacity 0.4s; white-space: nowrap;
}

#zoom-wrap { position: absolute; top: 8px; right: 8px; display: flex; flex-direction: column; gap: 4px; }

.zbtn {
  width: 28px; height: 28px;
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-secondary);
  border-radius: 6px; font-size: 15px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--color-text-primary);
}
.zbtn:hover { background: var(--color-background-secondary); }

#panel {
  height: 210px; border-top: 0.5px solid var(--color-border-tertiary);
  background: var(--color-background-primary);
  display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
}

#ph {
  padding: 10px 14px 8px; border-bottom: 0.5px solid var(--color-border-tertiary);
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
#pflag { font-size: 22px; line-height: 1; }
#pname { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
#psub { font-size: 12px; color: var(--color-text-secondary); margin-left: auto; }

#pb {
  flex: 1; overflow-y: auto; padding: 10px 14px;
  display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px;
}
#pb.empty {
  display: flex; align-items: center; justify-content: center;
  color: var(--color-text-secondary); font-size: 13px; text-align: center;
  line-height: 1.6;
}

.card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 8px 10px; }
.card-title { font-size: 10px; color: var(--color-text-secondary); font-weight: 500; letter-spacing: 0.04em; margin-bottom: 4px; }
.card-body { font-size: 12px; color: var(--color-text-primary); line-height: 1.55; }

@media (max-width: 600px) {
  #pb { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<h1>🌍 世界文化マップ <span class="sub">— 国をクリックして文化・宗教・政治を調べる</span></h1>

<div id="app">
  <div id="map-container">
    <svg id="map" viewBox="0 0 960 500" preserveAspectRatio="xMidYMid meet"></svg>
    <div id="hint">🌍 国をクリックして詳細を表示</div>
    <div id="zoom-wrap">
      <button class="zbtn" onclick="doZoom(1.3)" title="拡大">+</button>
      <button class="zbtn" onclick="doZoom(0.77)" title="縮小">−</button>
      <button class="zbtn" onclick="resetView()" title="リセット" style="font-size:11px">↺</button>
    </div>
  </div>
  <div id="panel">
    <div id="ph">
      <span id="pflag">🌐</span>
      <span id="pname">国をクリックしてください</span>
      <span id="psub"></span>
    </div>
    <div id="pb" class="empty">地図上の国を選ぶと、食文化・生活習慣・宗教・政治制度の情報が表示されます</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>

};

const highlights = new Set(Object.keys(DB).map(Number));
const svg = d3.select('#map');
const g = svg.append('g');
let scale=1, tx=0, ty=0, dragging=false, sx, sy, stx, sty, activeEl=null;

const proj = d3.geoNaturalEarth1().scale(153).translate([480, 250]);
const pathGen = d3.geoPath().projection(proj);

fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
  .then(r => r.json())
  .then(world => {
    const countries = topojson.feature(world, world.objects.countries);
    g.selectAll('.country')
      .data(countries.features).enter().append('path')
      .attr('class', d => 'country' + (highlights.has(+d.id) ? ' highlight' : ''))
      .attr('d', pathGen)
      .on('click', (evt, d) => {
        const info = DB[+d.id];
        if (!info) return;
        if (activeEl) d3.select(activeEl).classed('active', false);
        activeEl = evt.currentTarget;
        d3.select(activeEl).classed('active', true).classed('highlight', false);
        document.getElementById('hint').style.opacity = '0';
        showPanel(info);
      });
  });

function showPanel(info) {
  document.getElementById('pflag').textContent = info.flag;
  document.getElementById('pname').textContent = info.name;
  document.getElementById('psub').textContent = info.region;
  const pb = document.getElementById('pb');
  pb.className = '';
  pb.innerHTML = `
    <div class="card"><div class="card-title">🍚 食文化</div><div class="card-body">${info.food}</div></div>
    <div class="card"><div class="card-title">🏠 生活習慣</div><div class="card-body">${info.life}</div></div>
    <div class="card"><div class="card-title">🕌 宗教・価値観</div><div class="card-body">${info.religion}</div></div>
    <div class="card"><div class="card-title">🏛 政治の仕組み</div><div class="card-body">${info.politics}</div></div>`;
}

// ドラッグ操作
const mapEl = document.getElementById('map');
mapEl.addEventListener('mousedown', e => {
  if (e.target.classList.contains('country')) return;
  dragging = true; sx = e.clientX; sy = e.clientY; stx = tx; sty = ty;
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  tx = stx + (e.clientX - sx); ty = sty + (e.clientY - sy); applyT();
});
window.addEventListener('mouseup', () => dragging = false);

// ホイールズーム
mapEl.addEventListener('wheel', e => {
  e.preventDefault();
  doZoom(e.deltaY < 0 ? 1.15 : 0.87);
}, { passive: false });

function doZoom(f) { scale = Math.max(0.8, Math.min(14, scale * f)); applyT(); }
function resetView() { scale = 1; tx = 0; ty = 0; applyT(); }
function applyT() { g.attr('transform', `translate(${tx},${ty}) scale(${scale})`); }
</script>
</body>
</html>
