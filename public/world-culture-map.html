<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>世界文化マップ</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:   #0f172a; --bg2: #1e293b; --bg3: #273449;
  --tx:   #f1f5f9; --tx2: #94a3b8; --tx3: #64748b;
  --bd:   #334155; --bd2: #475569;
  --font: 'Hiragino Sans','Noto Sans JP',system-ui,-apple-system,'Yu Gothic',sans-serif;
  --r: 8px;
}

html,body { height:100%; font-family:var(--font); background:var(--bg); color:var(--tx); overflow:hidden; }

/* ── ヘッダー ── */
#header {
  display:flex; align-items:center; gap:10px; padding:8px 14px;
  border-bottom:0.5px solid var(--bd); flex-shrink:0;
  background:var(--bg);
}
#header h1 { font-size:18px; font-weight:500; white-space:nowrap; }
#header .sub { font-size:14px; color:var(--tx2); }
#search-wrap { margin-left:auto; position:relative; }
#search {
  font-size:15px; padding:4px 28px 4px 8px;
  border:0.5px solid var(--bd2); border-radius:16px;
  background:var(--bg2); color:var(--tx); width:160px;
  outline:none;
}
#search:focus { border-color:#38bdf8; }
#search-icon { position:absolute; right:8px; top:50%; transform:translateY(-50%); font-size:13px; color:var(--tx3); pointer-events:none; }
#country-count { font-size:14px; color:var(--tx3); white-space:nowrap; }

/* ── レイアウト ── */
#app { display:flex; flex-direction:row; height:calc(100vh - 37px); }

/* ── 地図 ── */
#map-container { flex:1; position:relative; overflow:hidden; background:#0d1e35; min-width:0; }
svg#map { width:100%; height:100%; cursor:grab; display:block; }
svg#map:active { cursor:grabbing; }

.country { fill:#2a3a4e; stroke:#3d5068; stroke-width:0.3; cursor:default; transition:fill 0.12s; }
.country.has-data { cursor:pointer; }
.country.r-east-asia  { fill:#243850; }
.country.r-southeast-asia { fill:#1e3a4a; }
.country.r-south-asia { fill:#263645; }
.country.r-europe     { fill:#1e3830; }
.country.r-middle-east{ fill:#3a2e18; }
.country.r-africa     { fill:#3a2818; }
.country.r-americas   { fill:#1e2e48; }
.country.r-oceania    { fill:#183438; }
.country.r-centralasia{ fill:#30281a; }

.country.has-data:hover { filter:brightness(1.3); }
.country.active { fill:#38bdf8 !important; filter:none; }

/* ── ツールチップ ── */
#tooltip {
  position:absolute; pointer-events:none;
  background:rgba(0,0,0,0.72); color:#fff;
  font-size:15px; padding:4px 12px; border-radius:12px;
  white-space:nowrap; transform:translate(-50%,-130%);
  opacity:0; transition:opacity 0.15s;
}

/* ── ズームコントロール ── */
#zoom-wrap { position:absolute; top:8px; right:8px; display:flex; flex-direction:column; gap:4px; }
.zbtn {
  width:30px; height:30px; background:var(--bg); border:0.5px solid var(--bd2);
  border-radius:6px; font-size:16px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; color:var(--tx);
}
.zbtn:hover { background:var(--bg2); }

/* ── ヒント ── */
#hint {
  position:absolute; bottom:10px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,0.5); color:#fff; font-size:14px;
  padding:4px 16px; border-radius:20px; pointer-events:none; white-space:nowrap;
  transition:opacity 0.5s;
}

/* ── 凡例 ── */
#legend {
  position:absolute; bottom:10px; right:8px;
  background:rgba(15,23,42,0.90); border:0.5px solid var(--bd);
  border-radius:var(--r); padding:6px 10px; font-size:13px; color:var(--tx2);
  backdrop-filter:blur(4px);
}
.leg-row { display:flex; align-items:center; gap:5px; margin-bottom:3px; }
.leg-row:last-child { margin-bottom:0; }
.leg-dot { width:9px; height:9px; border-radius:2px; flex-shrink:0; }

/* ── パネル（左サイドバー） ── */
#panel {
  border-right:0.5px solid var(--bd); background:var(--bg);
  display:flex; flex-direction:column; flex-shrink:0;
  width:380px; height:100%; order:-1;
}
#ph {
  padding:9px 14px 7px; border-bottom:0.5px solid var(--bd);
  display:flex; align-items:center; gap:8px; flex-shrink:0;
}
#pflag { font-size:28px; line-height:1; }
#pname { font-size:19px; font-weight:500; }
#psub  { font-size:14px; color:var(--tx2); }
#pinfo { font-size:14px; color:var(--tx3); }
#japan-map-btn {
  display:none; margin-left:auto; flex-shrink:0;
  border:1px solid rgba(56,189,248,0.35); background:rgba(56,189,248,0.10);
  color:#38bdf8; border-radius:6px; padding:3px 9px 3px 7px;
  font-size:12px; cursor:pointer; white-space:nowrap; line-height:1.5;
}
#japan-map-btn:hover { background:rgba(56,189,248,0.22); }

#pb {
  flex:1; overflow-y:auto; padding:10px 14px;
  display:grid; grid-template-columns:repeat(2,1fr); gap:8px;
}
#pb.empty {
  display:flex; align-items:center; justify-content:center;
  color:var(--tx2); font-size:14px; text-align:center; line-height:1.7;
}

.card { background:var(--bg2); border-radius:var(--r); padding:8px 10px; min-width:0; }
.card-title { font-size:13px; color:var(--tx2); font-weight:500; letter-spacing:0.04em; margin-bottom:4px; }
.card-body  { font-size:14px; color:var(--tx); line-height:1.55; }

/* ── 経済ビュー切替スイッチャー ── */
.econ-switcher {
  display:flex; background:var(--bg3); border-radius:8px; padding:3px; gap:2px;
  grid-column:1/-1; margin-bottom:4px;
}
.econ-sw-btn {
  flex:1; border:none; background:transparent; color:var(--tx2);
  font-size:11px; padding:6px 4px; border-radius:6px; cursor:pointer;
  transition:background 0.15s,color 0.15s; white-space:nowrap;
}
.econ-sw-btn.active {
  background:var(--bg); color:var(--tx); font-weight:600;
  box-shadow:0 1px 4px rgba(0,0,0,0.14);
}
.econ-sw-btn:hover:not(.active){ background:var(--bg2); }
/* 経済ビュー共通カード（全幅・スクロール可） */
.econ-full-card {
  grid-column:1/-1; background:var(--bg2); border-radius:var(--r);
  padding:14px 16px; display:flex; flex-direction:column; gap:12px;
}
.econ-section-label {
  font-size:0.8em; color:var(--tx3); margin-bottom:2px; display:block;
}
.econ-value { font-size:1.15em; font-weight:600; }
.econ-bar-bg {
  background:var(--bg3); border-radius:4px; height:7px;
  margin-top:5px; overflow:hidden;
}
.econ-bar-fill { height:100%; border-radius:4px; transition:width 0.4s ease; }
.econ-grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px 18px; }
.econ-sign-chip {
  display:inline-block; font-size:0.78em; font-weight:700;
  padding:1px 6px; border-radius:4px; margin-left:5px; vertical-align:middle;
}
.econ-sign-pos { background:rgba(74,222,128,0.15); color:#4ade80; }
.econ-sign-neg { background:rgba(248,113,113,0.13); color:#f87171; }

@media(max-width:700px){
  /* 狭い画面では下部パネルに戻す */
  #app { flex-direction:column; }
  #panel { order:0; width:100%; height:280px; border-right:none; border-top:0.5px solid var(--bd); }
  #pb { grid-template-columns:1fr 1fr; }
  #search { width:110px; }
  #legend { display:none; }
}
@media(max-width:440px){
  #pb { grid-template-columns:1fr; }
  #panel { height:240px; }
}

/* ── タブ ── */
#tabs {
  display:flex; gap:0; overflow-x:auto; flex-shrink:0;
  border-bottom:0.5px solid var(--bd); background:var(--bg);
  scrollbar-width:none;
}
#tabs::-webkit-scrollbar { display:none; }
.tab {
  font-size:11px; padding:6px 9px; border:none; background:transparent;
  color:var(--tx2); cursor:pointer; white-space:nowrap;
  border-bottom:2px solid transparent; transition:color 0.15s;
  flex-shrink:0;
}
.tab:hover { color:var(--tx); background:var(--bg2); }
.tab.active { color:var(--tx); border-bottom-color:#38bdf8; font-weight:500; }

.no-data {
  display:flex; align-items:center; justify-content:center;
  color:var(--tx3); font-size:13px; height:100%; text-align:center;
}

/* ── バッジ（普遍/国別） ── */
.badge {
  display:inline-block; font-size:9px; padding:1px 5px;
  border-radius:8px; margin-left:4px; vertical-align:middle; font-weight:400;
}
.badge.univ { background:rgba(56,189,248,0.15); color:#38bdf8; }
.badge.vary { background:rgba(251,191,36,0.18); color:#fbbf24; }

/* スクロールバー細め */
#pb::-webkit-scrollbar { width:4px; }
#pb::-webkit-scrollbar-track { background:transparent; }
#pb::-webkit-scrollbar-thumb { background:var(--bd2); border-radius:4px; }

/* ── 都道府県最低賃金マップ（モーダル） ── */
#japan-section {
  position:fixed; z-index:300; inset:0;
  background:rgba(0,0,0,0.55);
  display:none; align-items:center; justify-content:center;
  backdrop-filter:blur(2px);
}
#japan-section.open { display:flex; }
#japan-inner {
  background:var(--bg); border-radius:12px;
  box-shadow:0 24px 64px rgba(0,0,0,0.45);
  width:min(94vw,1040px); height:min(88vh,740px);
  display:flex; flex-direction:column; overflow:hidden;
}
#japan-section-hdr {
  font-size:13px; color:var(--tx2); padding:10px 16px;
  border-bottom:0.5px solid var(--bd); flex-shrink:0;
  background:var(--bg2); display:flex; align-items:center; gap:8px;
}
.japan-close {
  margin-left:auto; background:none; border:none;
  color:var(--tx2); font-size:20px; cursor:pointer; padding:0 4px; line-height:1;
}
.japan-close:hover { color:var(--tx); }
#japan-body { flex:1; display:flex; flex-direction:row; overflow:hidden; }
#japan-map-col {
  flex:1; position:relative; padding:8px 8px 4px;
}
#japan-svg { width:100%; height:100%; }
#pref-tip {
  position:absolute; pointer-events:none;
  background:rgba(0,0,0,0.75); color:#fff;
  font-size:12px; padding:2px 10px; border-radius:8px;
  white-space:nowrap; opacity:0; transition:opacity 0.1s;
  top:0; left:0;
}
#japan-info-col {
  width:260px; flex-shrink:0; padding:20px 22px;
  border-left:0.5px solid var(--bd);
  display:flex; flex-direction:column; justify-content:center;
}
#pref-name { font-size:17px; font-weight:600; color:var(--tx); margin-bottom:6px; }
#pref-wage { line-height:1.1; margin-bottom:6px; }
#pref-sub  { font-size:13px; color:var(--tx2); }
#pref-note { font-size:11px; color:var(--tx3); margin-top:12px; line-height:1.6; }
#japan-legend {
  position:absolute; bottom:10px; left:12px;
  display:flex; flex-direction:column; gap:2px;
}
.jleg { display:flex; align-items:center; gap:4px; font-size:10px; color:var(--tx2); }
.jleg-dot { width:10px; height:10px; border-radius:2px; flex-shrink:0; }
.jpref-path {
  stroke:var(--bg); stroke-width:0.4; cursor:pointer;
  transition:opacity 0.1s, stroke-width 0.1s;
}
.jpref-path:hover { stroke:#555; stroke-width:1; opacity:0.85; }
.jpref-path.jpref-active { stroke:#c0784a !important; stroke-width:2; opacity:1; }
</style>
</head>
<body>

<div id="header">
  <h1>🌍 世界文化マップ</h1>
  <span class="sub">クリックで文化・宗教・言語・政治を表示</span>
  <span id="country-count"></span>
  <div id="search-wrap">
    <input id="search" type="search" placeholder="国名で検索…" autocomplete="off" oninput="doSearch(this.value)">
    <span id="search-icon">🔍</span>
  </div>
</div>

<div id="app">
  <div id="map-container">
    <svg id="map" viewBox="0 0 960 500" preserveAspectRatio="xMidYMid meet"></svg>
    <div id="tooltip"></div>
    <div id="hint">🌍 データのある国（色付き）をクリック</div>
    <div id="zoom-wrap">
      <button class="zbtn" onclick="doZoom(1.3)" title="拡大">+</button>
      <button class="zbtn" onclick="doZoom(0.77)" title="縮小">−</button>
      <button class="zbtn" onclick="resetView()" title="リセット" style="font-size:11px">↺</button>
    </div>
    <div id="legend">
      <div class="leg-row"><div class="leg-dot" style="background:#1e2e48"></div>南北アメリカ</div>
      <div class="leg-row"><div class="leg-dot" style="background:#1e3830"></div>ヨーロッパ</div>
      <div class="leg-row"><div class="leg-dot" style="background:#3a2e18"></div>中東・北アフリカ</div>
      <div class="leg-row"><div class="leg-dot" style="background:#3a2818"></div>サブサハラ・アフリカ</div>
      <div class="leg-row"><div class="leg-dot" style="background:#30281a"></div>東・中央アジア</div>
      <div class="leg-row"><div class="leg-dot" style="background:#183438"></div>東南アジア・オセアニア</div>
    </div>
  </div>

  <div id="panel">
    <div id="ph">
      <span id="pflag">🌐</span>
      <span id="pname">国をクリックしてください</span>
      <span id="psub"></span>
      <span id="pinfo"></span>
      <button id="japan-map-btn" onclick="openJapanMap()" title="都道府県別最低賃金マップを開く">🗾 都道府県</button>
    </div>
    <div id="tabs">
      <button class="tab active" onclick="switchTab(0)">📋 基本情報</button>
      <button class="tab" onclick="switchTab(1)">💬 コミュニ</button>
      <button class="tab" onclick="switchTab(2)">⚖️ ルール</button>
      <button class="tab" onclick="switchTab(3)">💡 価値観</button>
      <button class="tab" onclick="switchTab(4)">💴 労働・経済</button>
    </div>
    <div id="pb" class="empty">地図上の色付きの国を選ぶと情報が表示されます</div>
  </div>

</div>

<!-- ── 都道府県別最低賃金マップ モーダル（#app外） ── -->
<div id="japan-section" onclick="if(event.target===this)this.classList.remove('open')">
  <div id="japan-inner">
    <div id="japan-section-hdr">
      🗾 都道府県別最低賃金マップ
      <span id="minwage-updated" style="font-size:11px;color:var(--tx3)"></span>
      <button class="japan-close" onclick="document.getElementById('japan-section').classList.remove('open')" title="閉じる">✕</button>
    </div>
    <div id="japan-body">
      <div id="japan-map-col">
        <svg id="japan-svg"></svg>
        <div id="pref-tip"></div>
        <div id="japan-legend">
          <div class="jleg"><div class="jleg-dot" style="background:#fef0d9"></div>〜959円</div>
          <div class="jleg"><div class="jleg-dot" style="background:#fdcc8a"></div>960〜999</div>
          <div class="jleg"><div class="jleg-dot" style="background:#fc8d59"></div>1,000〜1,049</div>
          <div class="jleg"><div class="jleg-dot" style="background:#e34a33"></div>1,050〜1,099</div>
          <div class="jleg"><div class="jleg-dot" style="background:#b30000"></div>1,100円〜</div>
        </div>
      </div>
      <div id="japan-info-col">
        <div id="pref-name">🗾 都道府県をクリック</div>
        <div id="pref-wage"></div>
        <div id="pref-sub"></div>
        <div id="pref-note">地域別最低賃金（厚生労働省）<br>※毎年10月頃に改定</div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>

const g = svg.append('g');
let scale=1, tx=0, ty=0, dragging=false, sx, sy, stx, sty, activeEl=null;
const proj = d3.geoNaturalEarth1().scale(153).translate([480,250]);
const pathGen = d3.geoPath().projection(proj);
const tooltip = document.getElementById('tooltip');

// カウント表示
document.getElementById('country-count').textContent = `${highlights.size}カ国収録`;

fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
  .then(r=>r.json()).then(world=>{
    const countries = topojson.feature(world, world.objects.countries);
    g.selectAll('.country')
      .data(countries.features).enter().append('path')
      .attr('class', d=>{
        const info = DB[+d.id];
        let cls = 'country';
        if(info){
          cls += ' has-data';
          const rc = REGION_CLASS[info.region];
          if(rc) cls += ' '+rc;
        }
        return cls;
      })
      .attr('d', pathGen)
      .on('mouseover', (evt,d)=>{
        const info = DB[+d.id];
        if(!info) return;
        tooltip.textContent = info.flag+' '+info.name;
        tooltip.style.opacity='1';
      })
      .on('mousemove', (evt)=>{
        const rect = document.getElementById('map-container').getBoundingClientRect();
        tooltip.style.left = (evt.clientX - rect.left)+'px';
        tooltip.style.top  = (evt.clientY - rect.top)+'px';
      })
      .on('mouseout', ()=>{
        tooltip.style.opacity='0';
      })
      .on('click', (evt,d)=>{
        const info = DB[+d.id];
        if(!info) return;
        if(activeEl) d3.select(activeEl).classed('active',false);
        activeEl = evt.currentTarget;
        d3.select(activeEl).classed('active',true);
        document.getElementById('hint').style.opacity='0';
        tooltip.style.opacity='0';
        showPanel(info, +d.id);
      });
  });

let currentTab = 0;
let currentInfo = null;
let currentCountryId = null;
let econView = 'work'; // 'work' | 'country' | 'earth'

function switchEconView(v){
  econView = v;
  if(currentInfo) renderCards(currentInfo, 4);
}

function switchTab(n){
  currentTab = n;
  if(n !== 4) econView = 'work'; // 労働タブ以外から戻ったときリセット
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===n));
  if(currentInfo) renderCards(currentInfo, n);
}

function card(icon, title, body, badge){
  const b = badge ? `<span class="badge ${badge==='univ'?'univ':'vary'}">${badge==='univ'?'普遍':'国別'}</span>` : '';
  return `<div class="card"><div class="card-title">${icon} ${title}${b}</div><div class="card-body">${body}</div></div>`;
}

function showPanel(info, id){
  currentInfo = info;
  currentCountryId = id;
  // タブ・ビューは維持（リセットしない）
  document.getElementById('pflag').textContent = info.flag;
  document.getElementById('pname').textContent = info.name;
  document.getElementById('psub').textContent  = info.region;
  document.getElementById('pinfo').textContent = '';
  // 都道府県ボタン：日本のときだけ表示
  const jBtn = document.getElementById('japan-map-btn');
  if(jBtn) jBtn.style.display = id === 392 ? '' : 'none';
  // 都道府県モーダルは自動では開かない。他の国クリックで閉じる。
  const js = document.getElementById('japan-section');
  if(js && id !== 392) js.classList.remove('open');
  renderCards(info, currentTab);
}

function openJapanMap(){
  const js = document.getElementById('japan-section');
  if(!js) return;
  js.classList.add('open');
  requestAnimationFrame(() => renderJapanMap());
}

// 検索
function doSearch(q){
  if(!q){ clearSearch(); return; }
  const kw = q.toLowerCase();
  const found = Object.entries(DB).find(([,v])=>v.name.includes(q) || v.name.toLowerCase().includes(kw));
  if(found){
    const [id,info] = found;
    const el = document.querySelector(`path.country.has-data`);
    // パス要素から対象を探す
    g.selectAll('.country').each(function(d){
      if(+d.id===+id){
        if(activeEl) d3.select(activeEl).classed('active',false);
        activeEl = this;
        d3.select(this).classed('active',true);
        showPanel(info, +id);
        // 対象国にズームイン
        const bounds = pathGen.bounds(d);
        const cx = (bounds[0][0]+bounds[1][0])/2;
        const cy = (bounds[0][1]+bounds[1][1])/2;
        const mapEl = document.getElementById('map-container');
        tx = mapEl.clientWidth/2 - cx*scale;
        ty = mapEl.clientHeight/2 - cy*scale;
        applyT();
      }
    });
  }
}
function clearSearch(){
  g.selectAll('.country.active').classed('active',false);
  activeEl=null;
}

// ── 慣性スクロール ──────────────────────────────────────────────────────
const mapEl = document.getElementById('map-container');
let vx=0, vy=0, raf=null;
const FRICTION = 0.90;   // 減速係数（0.85=快速 / 0.93=のんびり）
const MIN_V    = 0.3;

function animateInertia(){
  vx *= FRICTION; vy *= FRICTION;
  if(Math.abs(vx) < MIN_V && Math.abs(vy) < MIN_V){ raf=null; return; }
  tx += vx; ty += vy;
  applyT();
  raf = requestAnimationFrame(animateInertia);
}
function stopInertia(){ if(raf){ cancelAnimationFrame(raf); raf=null; } vx=0; vy=0; }

// ── マウス ───────────────────────────────────────────────────────────────
let prevX=0, prevY=0, prevT=0;

mapEl.addEventListener('mousedown', e=>{
  if(e.target.classList.contains('country')) return;
  stopInertia();
  dragging=true;
  sx=e.clientX; sy=e.clientY; stx=tx; sty=ty;
  prevX=e.clientX; prevY=e.clientY; prevT=performance.now();
  vx=0; vy=0;
  mapEl.style.cursor='grabbing';
});
window.addEventListener('mousemove', e=>{
  if(!dragging) return;
  const now = performance.now();
  const dt  = now - prevT;
  if(dt > 0){
    // 速度を指数移動平均でなめらかに
    vx = vx*0.4 + (e.clientX - prevX)*0.6;
    vy = vy*0.4 + (e.clientY - prevY)*0.6;
  }
  prevX=e.clientX; prevY=e.clientY; prevT=now;
  tx = stx + (e.clientX - sx);
  ty = sty + (e.clientY - sy);
  applyT();
});
window.addEventListener('mouseup', ()=>{
  if(!dragging) return;
  dragging=false;
  mapEl.style.cursor='grab';
  // 十分な速度があれば慣性アニメ開始
  if(Math.abs(vx) > MIN_V || Math.abs(vy) > MIN_V){
    raf = requestAnimationFrame(animateInertia);
  }
});

// ── タッチ操作（ピンチズーム + 慣性パン） ───────────────────────────────
let lastTouchDist=0;
let prevTX=0, prevTY=0, prevTT=0;

mapEl.addEventListener('touchstart', e=>{
  if(e.touches.length===1){
    stopInertia();
    dragging=true;
    sx=e.touches[0].clientX; sy=e.touches[0].clientY; stx=tx; sty=ty;
    prevTX=sx; prevTY=sy; prevTT=performance.now();
    vx=0; vy=0;
  } else if(e.touches.length===2){
    stopInertia(); dragging=false;
    lastTouchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
},{passive:true});

mapEl.addEventListener('touchmove', e=>{
  e.preventDefault();
  if(e.touches.length===1 && dragging){
    const now=performance.now(), dt=now-prevTT;
    if(dt>0){
      vx = vx*0.4 + (e.touches[0].clientX - prevTX)*0.6;
      vy = vy*0.4 + (e.touches[0].clientY - prevTY)*0.6;
    }
    prevTX=e.touches[0].clientX; prevTY=e.touches[0].clientY; prevTT=now;
    tx = stx + (e.touches[0].clientX - sx);
    ty = sty + (e.touches[0].clientY - sy);
    applyT();
  } else if(e.touches.length===2){
    const d = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    // ピンチの中心へズーム
    const rect = mapEl.getBoundingClientRect();
    const cx = ((e.touches[0].clientX + e.touches[1].clientX)/2) - rect.left;
    const cy = ((e.touches[0].clientY + e.touches[1].clientY)/2) - rect.top;
    zoomAt(cx, cy, d/lastTouchDist);
    lastTouchDist = d;
  }
},{passive:false});

mapEl.addEventListener('touchend', ()=>{
  if(!dragging) return;
  dragging=false;
  if(Math.abs(vx) > MIN_V || Math.abs(vy) > MIN_V){
    raf = requestAnimationFrame(animateInertia);
  }
},{passive:true});

// ── ホイールズーム（カーソル位置を中心に） ────────────────────────────────
mapEl.addEventListener('wheel', e=>{
  e.preventDefault();
  stopInertia();
  const rect   = mapEl.getBoundingClientRect();
  const mx     = e.clientX - rect.left;
  const my     = e.clientY - rect.top;
  const factor = e.deltaY < 0 ? 1.15 : 0.87;
  zoomAt(mx, my, factor);
},{passive:false});

// ── 共通ズーム関数 ────────────────────────────────────────────────────────
function zoomAt(cx, cy, factor){
  const newScale = Math.max(0.8, Math.min(14, scale * factor));
  const ratio = newScale / scale;
  tx = cx - (cx - tx) * ratio;
  ty = cy - (cy - ty) * ratio;
  scale = newScale;
  applyT();
}
function doZoom(f){
  const rect = mapEl.getBoundingClientRect();
  zoomAt(rect.width/2, rect.height/2, f);
}
function resetView(){
  stopInertia();
  scale=1; tx=0; ty=0; applyT();
}
function applyT(){ g.attr('transform',`translate(${tx},${ty}) scale(${scale})`); }

// ── 都道府県最低賃金マップ ─────────────────────────────────────────────────
let _jpTopo = null;

function prefBare(s){ return s ? s.replace(/[都道府県]$/, '') : ''; }
function prefFull(bare){
  if(bare === '北海道') return '北海道';
  if(bare === '東京')   return '東京都';
  if(bare === '大阪' || bare === '京都') return bare + '府';
  return bare + '県';
}
function prefWageColor(w){
  if(w >= 1100) return '#b30000';
  if(w >= 1050) return '#e34a33';
  if(w >= 1000) return '#fc8d59';
  if(w >=  960) return '#fdcc8a';
  return '#fef0d9';
}
function prefWage(rawName){
  const bare = prefBare(rawName);
  return MINWAGE_JP[bare] ?? MINWAGE_JP[rawName];
}

function renderJapanMap(){
  const svgEl = document.getElementById('japan-svg');
  if(!svgEl) return;
  if(_jpTopo){ _drawPrefMap(_jpTopo); return; }
  fetch('https://cdn.jsdelivr.net/gh/dataofjapan/land@master/japan.topojson')
    .then(r => r.json())
    .then(topo => { _jpTopo = topo; _drawPrefMap(topo); })
    .catch(() => {
      const col = document.getElementById('japan-map-col');
      if(col) col.innerHTML = '<div style="padding:12px;color:var(--tx3);font-size:12px">地図の読み込みに失敗しました<br>ネットワーク接続を確認してください</div>';
    });
}

function _drawPrefMap(topo){
  const svgEl = document.getElementById('japan-svg');
  if(!svgEl) return;
  const col = document.getElementById('japan-map-col');
  const W = col ? col.clientWidth  : 230;
  const H = col ? col.clientHeight : 192;

  const objKey = Object.keys(topo.objects)[0];
  const features = topojson.feature(topo, topo.objects[objKey]).features;
  const fc = { type:'FeatureCollection', features };

  const proj2 = d3.geoMercator().fitSize([W - 8, H - 28], fc);
  const path2 = d3.geoPath().projection(proj2);
  const svg2  = d3.select(svgEl);
  svg2.selectAll('*').remove();

  // 順位テーブル
  const sorted = Object.entries(MINWAGE_JP).sort(([,a],[,b]) => b - a);
  const rankOf = {};
  sorted.forEach(([n,], i) => { rankOf[n] = i + 1; });
  const avg = Math.round(sorted.reduce((s,[,v]) => s + v, 0) / sorted.length);

  const tip   = document.getElementById('pref-tip');
  const nameEl= document.getElementById('pref-name');
  const wageEl= document.getElementById('pref-wage');
  const subEl = document.getElementById('pref-sub');

  svg2.selectAll('.jpref-path')
    .data(features)
    .enter().append('path')
    .attr('class', 'jpref-path')
    .attr('d', path2)
    .attr('fill', d => {
      const w = prefWage(d.properties.nam_ja || d.properties.name || '');
      return prefWageColor(w ?? 951);
    })
    .on('mouseover', (evt, d) => {
      const raw  = d.properties.nam_ja || d.properties.name || '';
      const wage = prefWage(raw);
      if(tip){
        tip.textContent = `${prefFull(prefBare(raw))}：${wage != null ? wage.toLocaleString() + '円' : '-'}`;
        tip.style.opacity = '1';
      }
    })
    .on('mousemove', (evt) => {
      if(!tip || !col) return;
      const rect = col.getBoundingClientRect();
      tip.style.left = (evt.clientX - rect.left) + 'px';
      tip.style.top  = (evt.clientY - rect.top - 28) + 'px';
    })
    .on('mouseout', () => { if(tip) tip.style.opacity = '0'; })
    .on('click', (evt, d) => {
      const raw  = d.properties.nam_ja || d.properties.name || '';
      const bare = prefBare(raw);
      const full = prefFull(bare);
      const wage = prefWage(raw);
      const rank = rankOf[bare] ?? rankOf[raw] ?? '–';
      const diff = wage != null ? wage - avg : null;

      svg2.selectAll('.jpref-path').classed('jpref-active', false);
      d3.select(evt.currentTarget).classed('jpref-active', true);
      if(tip) tip.style.opacity = '0';

      if(nameEl) nameEl.textContent = full;
      if(wageEl) wageEl.innerHTML = wage != null
        ? `<span style="font-size:2em;font-weight:700;color:#178DDC">${wage.toLocaleString()}</span><span style="font-size:0.9em;color:var(--tx2)"> 円/時</span>`
        : '<span style="color:var(--tx3)">データなし</span>';
      if(subEl) subEl.innerHTML = wage != null
        ? `全国 <strong>${rank}</strong> 位（47都道府県中）　全国平均比 <strong style="color:${diff >= 0 ? '#178DDC' : '#c07010'}">${diff >= 0 ? '+' : ''}${diff}円</strong>`
        : '';
    });
}
</script>

</html>
